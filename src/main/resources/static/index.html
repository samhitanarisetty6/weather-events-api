<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Events</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="idle">
  <div class="page">
    <div class="brand-row">
      <span class="brand">Weather Events</span>
    </div>

    <section class="hero" id="hero">
      <svg class="scene" viewBox="0 0 400 720" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" style="stop-color:var(--sky-top)"/>
            <stop offset="55%" style="stop-color:var(--sky-mid)"/>
            <stop offset="100%" style="stop-color:var(--sky-bottom)"/>
          </linearGradient>
          <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" style="stop-color:var(--lake-top)"/>
            <stop offset="100%" style="stop-color:var(--lake-bottom)"/>
          </linearGradient>
        </defs>

        <rect x="0" y="0" width="400" height="720" fill="url(#sky)"/>

        <g transform="translate(60,260)">
          <g class="cloud drift-1">
            <ellipse cx="0" cy="0" rx="42" ry="18"/>
            <ellipse cx="30" cy="-10" rx="30" ry="16"/>
            <ellipse cx="-28" cy="6" rx="26" ry="14"/>
          </g>
        </g>
        <g transform="translate(260,340) scale(0.75)">
          <g class="cloud drift-2">
            <ellipse cx="0" cy="0" rx="42" ry="18"/>
            <ellipse cx="30" cy="-10" rx="30" ry="16"/>
            <ellipse cx="-28" cy="6" rx="26" ry="14"/>
          </g>
        </g>
        <g transform="translate(150,420) scale(0.55)">
          <g class="cloud drift-3">
            <ellipse cx="0" cy="0" rx="42" ry="18"/>
            <ellipse cx="30" cy="-10" rx="30" ry="16"/>
            <ellipse cx="-28" cy="6" rx="26" ry="14"/>
          </g>
        </g>

        <g transform="translate(0,100)">
          <circle class="sun" cx="110" cy="150" r="52"/>

          <polygon class="mountain mountain-back" points="0,340 70,230 140,320 210,220 280,330 340,250 400,340 400,620 0,620"/>
          <polygon class="mountain mountain-front" points="0,400 90,290 180,390 260,300 340,400 400,360 400,620 0,620"/>

          <path class="lake" d="M0,470 Q100,440 200,470 T400,465 L400,620 L0,620 Z" fill="url(#lake)"/>

          <polygon class="ground" points="0,560 130,500 260,545 400,500 400,620 0,620"/>

          <g class="tree tree-1" transform="translate(120,470)">
            <rect x="-4" y="60" width="8" height="30" class="trunk"/>
            <polygon points="0,0 -26,70 26,70"/>
            <polygon points="0,20 -20,80 20,80"/>
            <polygon points="0,40 -15,90 15,90"/>
          </g>
          <g class="tree tree-2" transform="translate(165,485) scale(0.8)">
            <rect x="-4" y="60" width="8" height="30" class="trunk"/>
            <polygon points="0,0 -26,70 26,70"/>
            <polygon points="0,20 -20,80 20,80"/>
            <polygon points="0,40 -15,90 15,90"/>
          </g>
          <g class="tree tree-3" transform="translate(85,490) scale(0.65)">
            <rect x="-4" y="60" width="8" height="30" class="trunk"/>
            <polygon points="0,0 -26,70 26,70"/>
            <polygon points="0,20 -20,80 20,80"/>
            <polygon points="0,40 -15,90 15,90"/>
          </g>
        </g>
      </svg>

      <div class="precip" id="precip"></div>

      <div class="hero-search centered" id="hero-search">
        <h1 class="hero-title">Weather Events</h1>
        <p class="tagline">Real-time weather &amp; local events for any city</p>

        <form id="search-form" class="search-bar">
          <input id="city-input" type="text" placeholder="Search a city..." autocomplete="off" required>
          <button type="submit" aria-label="Get weather">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
              <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </form>

        <span class="quick-cities-label">Try these cities</span>
        <div class="quick-cities">
          <button type="button" class="quick-city" data-city="Austin">Austin</button>
          <button type="button" class="quick-city" data-city="Atlanta">Atlanta</button>
          <button type="button" class="quick-city" data-city="Seattle">Seattle</button>
        </div>

        <p id="search-error" class="error-banner hidden"></p>
      </div>

      <div class="hero-content">
        <div class="location hidden" id="location"></div>

        <div class="condition-label hidden" id="condition-label"></div>

        <div class="temp-block hidden" id="temp-block">
          <span class="temp" id="temp">--</span><span class="temp-unit">&deg;</span>
        </div>

        <div class="events-overlay">
          <div class="events-idle-note">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
              <path d="M3 9h18" stroke="currentColor" stroke-width="1.6"/>
              <path d="M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <div>
              <p class="idle-note-title">Find upcoming local events in any city.</p>
              <p class="idle-note-sub">Search above to get started.</p>
            </div>
          </div>

          <h2>Local Events</h2>
          <div id="events-result">
            <p class="empty-state">Search a city to see upcoming events.</p>
          </div>
        </div>

        <div class="stat-bar hidden" id="stat-bar">
          <div class="stat">
            <span class="stat-value" id="stat-humidity">--%</span>
            <span class="stat-label">Humidity</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-visibility">-- mi</span>
            <span class="stat-label">Visibility</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-feels">--&deg;</span>
            <span class="stat-label">Feels like</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
